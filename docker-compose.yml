# Local Postgres for ergane.
#
# POSTGRES_USER (`ergane`) is the database OWNER / migrator. The official image
# makes it a superuser; `prisma migrate` connects as this role (DIRECT_DATABASE_URL).
#
# The application NEVER connects as `ergane`. It connects only as the
# least-privileged role `app_user`, which the init script below creates.
services:
  postgres:
    # pgvector/pgvector:pg16 = the official postgres:16 image + the pgvector
    # extension BINARIES. The extension itself is created by the Prisma
    # migration (CREATE EXTENSION, as owner); the image only has to ship it.
    image: pgvector/pgvector:pg16
    container_name: ergane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ergane
      POSTGRES_PASSWORD: ergane
      POSTGRES_DB: ergane
    ports:
      - "5432:5432"
    volumes:
      - ergane-pgdata:/var/lib/postgresql/data
      # Runs ONCE on first cluster init (as the superuser). Creates app_user.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ergane -d ergane"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ergane-pgdata:
